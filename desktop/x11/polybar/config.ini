[colors]
background = #1e1e2e
background-alt = #282840
foreground = #cdd6f4
foreground-alt = #a6adc8
primary = #89b4fa
secondary = #a6e3a1
urgent = #f38ba8

[bar/main]
width = 100%
height = 28
radius = 0
fixed-center = false

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2
line-color = ${colors.primary}

border-left-size = 0
border-right-size = 0
border-top-size = 0
border-bottom-size = 2
border-color = #313244

padding-left = 8
padding-right = 8
module-margin-left = 1
module-margin-right = 1

font-0 = "JetBrainsMono Nerd Font:size=11;2"
font-1 = "JetBrainsMono Nerd Font:style=Regular:size=11;2"
font-2 = "Noto Sans:size=10;2"

modules-left = workspaces
modules-center = date
modules-right = pulseaudio network sys-tray

separator = "|"
separator-foreground = ${colors.foreground-alt}

cursor-click = pointer
scroll-up = module-cycler-next
scroll-down = module-cycler-prev

enable-ipc = true

[module/workspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 2
label-active-margin = 0 2

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 2
label-occupied-margin = 0 2

label-urgent = %name%
label-urgent-foreground = ${colors.urgent}
label-urgent-padding = 2
label-urgent-margin = 0 2

label-empty = %name%
label-empty-foreground = ${colors.foreground-alt}
label-empty-padding = 2
label-empty-margin = 0 2

[module/date]
type = internal/date
interval = 1

date = %a %b %d
date-alt = %A %B %d %Y
time = %H:%M
time-alt = %H:%M:%S
format-prefix = " "
format-prefix-foreground = ${colors.primary}
format-foreground = ${colors.foreground}
label = %date%  %time%

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume =   %percentage%
label-volume-foreground = ${colors.foreground}
label-muted =   muted
label-muted-foreground = ${colors.urgent}

click-middle = pavucontrol

[module/network]
type = internal/network
interface-type = wired

format-connected = <label-connected>
label-connected =   %local_ip%
label-connected-foreground = ${colors.foreground}

format-disconnected = <label-disconnected>
label-disconnected =   no net
label-disconnected-foreground = ${colors.urgent}

[module/sys-tray]
type = internal/tray
tray-size = 16
tray-spacing = 4
